name: CI

on:
  pull_request:
  push:
    branches: [main]

# Al declarar permissions se pierden los defaults: packages:read es
# imprescindible para que npm resuelva @tpklabs/browchar-contracts.
permissions:
  contents: read
  packages: read

# Un push nuevo a la misma rama cancela la corrida anterior.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # .npmrc referencia ${GITHUB_TOKEN}: sin la variable definida, cualquier
      # comando npm falla con "Failed to replace env in config". El token del
      # propio workflow alcanza para leer @tpklabs/browchar-contracts de
      # GitHub Packages (mismo owner).
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # src/config/env.ts exige DATABASE_URL al importarse (lo hacen los
      # tests via jest). No se conecta a ninguna DB: alcanza un valor dummy.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Fuente única del requisito de Node: .nvmrc (>=22.19, exigido por el
          # undici de Testcontainers en el e2e — ver engines en package.json).
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      # prisma/generated está gitignoreado; tests y build lo necesitan.
      - name: Generate Prisma client
        run: npx prisma generate

      # Las reglas type-aware de ESLint resuelven @tpklabs/browchar-contracts
      # contra su dist/ (main/types del paquete) — sin este build previo, todo
      # import del paquete lintea como "type that cannot be resolved".
      - name: Build contracts package
        run: npm run contracts:build

      # Suite propia del paquete compartido (incluye la auto-validación de
      # los fixtures del contrato, DEV-202). El jest raíz no la cubre
      # (rootDir: src), así que corre explícita. test:cov aplica su propio
      # coverageThreshold (DEV-150) — el paquete es fuente de verdad compartida.
      - name: Test contracts package
        run: npm run test:cov -w @tpklabs/browchar-contracts

      - name: Lint
        run: npm run lint

      - name: Validate seed data
        run: npm run validate:data

      # --coverage aplica el coverageThreshold de package.json (DEV-150): la
      # corrida falla si la cobertura baja del umbral acordado.
      - name: Test
        run: npm run test:cov

      - name: Build
        run: npm run build

      # e2e black-box (DEV-149): el globalSetup levanta Postgres con
      # Testcontainers (Docker está disponible en ubuntu-latest), migra y
      # arranca la app real (npm run start:prod). Usa test:e2e:run —sin build—
      # para reusar el dist del step Build de arriba (no recompilar dos veces).
      - name: E2E tests
        run: npm run test:e2e:run
