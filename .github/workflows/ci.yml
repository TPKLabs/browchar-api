name: CI

on:
  pull_request:
  push:
    branches: [main]

# Al declarar permissions se pierden los defaults: packages:read es
# imprescindible para que npm resuelva @tpklabs/browchar-contracts.
permissions:
  contents: read
  packages: read

# Un push nuevo a la misma rama cancela la corrida anterior.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + unit + build: no necesita Docker, corre rápido. Aparte del job e2e
  # (DEV-149) para que ambos corran en paralelo y una falla lenta del e2e no
  # bloquee el feedback rápido de lint/tests.
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # .npmrc referencia ${GITHUB_TOKEN}: sin la variable definida, cualquier
      # comando npm falla con "Failed to replace env in config". El token del
      # propio workflow alcanza para leer @tpklabs/browchar-contracts de
      # GitHub Packages (mismo owner).
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # src/config/env.ts exige DATABASE_URL al importarse (lo hacen los
      # tests via jest). No se conecta a ninguna DB: alcanza un valor dummy.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Fuente única del requisito de Node: .nvmrc (>=22.19, exigido por el
          # undici de Testcontainers en el job e2e — ver engines en package.json).
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      # prisma/generated está gitignoreado; tests y build lo necesitan.
      - name: Generate Prisma client
        run: npx prisma generate

      # Las reglas type-aware de ESLint resuelven @tpklabs/browchar-contracts
      # contra su dist/ (main/types del paquete) — sin este build previo, todo
      # import del paquete lintea como "type that cannot be resolved".
      - name: Build contracts package
        run: npm run contracts:build

      # Suite propia del paquete compartido (incluye la auto-validación de
      # los fixtures del contrato, DEV-202). El jest raíz no la cubre
      # (rootDir: src), así que corre explícita. test:cov aplica su propio
      # coverageThreshold (DEV-150) — el paquete es fuente de verdad compartida.
      - name: Test contracts package
        run: npm run test:cov -w @tpklabs/browchar-contracts

      - name: Lint
        run: npm run lint

      - name: Validate seed data
        run: npm run validate:data

      # --coverage aplica el coverageThreshold de package.json (DEV-150): la
      # corrida falla si la cobertura baja del umbral acordado.
      - name: Test
        run: npm run test:cov

      - name: Build
        run: npm run build

  # e2e black-box (DEV-149): globalSetup levanta Postgres con Testcontainers
  # (Docker está disponible en ubuntu-latest), migra y arranca la app real
  # (npm run start:prod). Job aparte de `checks`: es el más lento (build +
  # contenedor) y no debería demorar el feedback de lint/unit.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # test:e2e encadena prisma generate + build + test:e2e:run (una sola
      # compilación); no depende del job `checks`, así ambos jobs corren en
      # paralelo sin pasarse artefactos entre sí.
      - name: E2E tests
        run: npm run test:e2e

      # Si el e2e falla, subir junit + logs del server/Postgres para
      # diagnosticar sin tener que reproducir localmente.
      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-artifacts
          path: test-results/
          retention-days: 7
